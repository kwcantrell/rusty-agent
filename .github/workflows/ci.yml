name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: bash scripts/ci.sh
  coverage:
    runs-on: ubuntu-latest
    # Tracked number, not a gate (spec 2026-07-02 eval-flywheel §5): a red
    # coverage job must never block a merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage summary
        working-directory: agent
        run: |
          cargo llvm-cov --workspace --summary-only | tee /tmp/llvm-cov-summary.txt
          {
            echo '### cargo llvm-cov (agent workspace)'
            echo '```'
            grep -E '^(Filename|TOTAL)' /tmp/llvm-cov-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
