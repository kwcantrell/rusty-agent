# Example invocation reference (flags shown; this file is documentation only).
# agent --base-url http://localhost:30000 --model my-model --protocol native --workspace .
base_url = "http://localhost:30000"
model = "default"
protocol = "native"   # or "prompted"
workspace = "."
context_limit = 8192

# Named sub-agents (Phase 3B-1). Each becomes a `subagent_type` the model can
# pick via dispatch_agent. Only name/description/system_prompt are required.
# [[named_subagents]]
# name = "reviewer"
# description = "Reviews Rust changes for correctness and style."
# system_prompt = "You are a meticulous Rust reviewer. Report concrete findings."
# tools = ["read_file", "grep", "git_status"]   # optional allowlist (default: all)
# tool_call_limit = 50                            # optional runaway bound (1..=1000)
# # model = { model = "haiku" }                   # optional; same endpoint only
# # Optional: force this sub-agent to return a structured answer via the built-in
# # `respond` tool. FLAT objects only — scalar / enum / array-of-scalar properties,
# # `required`, and `additionalProperties = false`. No nesting, no regex/pattern.
# # The dispatch handoff's first line is then the JSON payload (or a marked fallback).
# # response_format = { type = "object", additionalProperties = false, required = ["severity", "summary"], properties = { severity = { type = "string", enum = ["low", "high"] }, files = { type = "array", items = { type = "string" } }, summary = { type = "string" } } }
