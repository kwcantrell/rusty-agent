# Example invocation reference (flags shown; this file is documentation only).
# The real runtime config on disk is JSON, parsed field-by-field (serde_json,
# `PartialRuntimeConfig` merge) — this TOML file never round-trips the loader.
# It exists purely as an illustrative reference for the available fields;
# translate keys/values into your actual JSON config by hand.
# agent --base-url http://localhost:30000 --model my-model --protocol native --workspace .
base_url = "http://localhost:30000"
model = "default"
protocol = "native"   # or "prompted"
workspace = "."
context_limit = 8192

# File-based memory (Phase 4A). `memory` gates the memory-index load +
# prompt discipline only — the `memories/project/` mount (read-write to
# tools) stays mounted either way, so files are always reachable by path.
memory = true            # default true; false disables load + discipline (mount still on)
# memories_dir = "/custom/path"   # override the memory store root;
                                   # default: ~/.rusty-agent/memories
                                   # (real consumer: test isolation)

# Auto-deny an unanswered approval after N seconds (headless/eval callers).
# Unset (default): an unanswered approval parks durably — the run survives
# frontend disconnect and daemon restart, and resumes when answered.
# The CLI's own interactive prompt has a separate, always-on 300s timeout
# that parks-and-exits rather than denying; reopen it with
# `agent sessions reopen <id>`.
# approval_auto_deny_secs = 300

# Named sub-agents (Phase 3B-1). Each becomes a `subagent_type` the model can
# pick via dispatch_agent. Only name/description/system_prompt are required.
# [[named_subagents]]
# name = "reviewer"
# description = "Reviews Rust changes for correctness and style."
# system_prompt = "You are a meticulous Rust reviewer. Report concrete findings."
# tools = ["read_file", "grep", "git_status"]   # optional allowlist (default: all)
# tool_call_limit = 50                            # optional runaway bound (1..=1000)
# # model = { model = "haiku" }                   # optional; same endpoint only
# # Optional: force this sub-agent to return a structured answer via the built-in
# # `respond` tool. FLAT objects only — scalar / enum / array-of-scalar properties,
# # `required`, and `additionalProperties = false`. No nesting, no regex/pattern.
# # The dispatch handoff's first line is then the JSON payload (or a marked fallback).
# # response_format = { type = "object", additionalProperties = false, required = ["severity", "summary"], properties = { severity = { type = "string", enum = ["low", "high"] }, files = { type = "array", items = { type = "string" } }, summary = { type = "string" } } }
# # Optional floor-only permissions (3B-1c): these can only TIGHTEN the runtime's
# # base policy for this sub-agent and everything it dispatches — never loosen it.
# # Patterns: exact tool name, trailing-* prefix ("github__*" covers one MCP
# # server's tools — names are the SANITIZED "{server}__{tool}", case-sensitive),
# # or bare "*" (every tool, INCLUDING built-ins like respond/context_compact —
# # fail-closed for this child, so use with care). There is no allow list, by design.
# # NOTE: a misspelled `permissions` key is silently ignored (the spec loads
# # unfloored); an unknown key INSIDE the block (e.g. `allow`) fails the whole
# # config file parse and the daemon falls back to flag defaults.
# # [named_subagents.permissions]
# # deny = ["execute_command", "github__*"]   # floored at Deny (with reason)
# # ask  = ["write_file", "edit_file"]        # floored at Ask (approval prompt)
